<!DOCTYPE html>
<html lang="en">
<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>{{ site_title }} — savannah.dev</title>
     <meta name="description" content="{{ page_description }}">
     <meta name="author" content="{{ site_name }}">
     <meta name="theme-color" content="#e8590d">
     <link rel="canonical" href="{{ page_url }}">
     <link rel="icon" type="image/x-icon" href="/favicon.ico">
     <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32x32.png">
     <link rel="icon" type="image/png" sizes="16x16" href="/static/favicon-16x16.png">
     <link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
     <link rel="alternate" type="application/rss+xml" title="{{ site_name }} RSS" href="/index.xml">
     <meta property="og:type" content="website">
     <meta property="og:site_name" content="{{ site_name }}">
     <meta property="og:title" content="{{ site_title }}">
     <meta property="og:description" content="{{ page_description }}">
     <meta property="og:url" content="{{ page_url }}">
     <meta property="og:image" content="{{ page_image }}">
     <meta name="twitter:card" content="summary_large_image">
     <meta name="twitter:title" content="{{ site_title }}">
     <meta name="twitter:description" content="{{ page_description }}">
     <meta name="twitter:image" content="{{ page_image }}">
     <link rel="preconnect" href="https://fonts.googleapis.com">
     <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
     <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
     <style>
         :root {
              --bg: #fefcf9;
              --bg-alt: #fdf8f3;
              --text: #1a1a1a;
              --text-muted: #6b6560;
              --accent: #e8590d;
              --accent-light: #fff3ec;
              --accent-hover: #d44f0a;
              --border: #f0e6dc;
              --card-bg: #ffffff;
              --card-shadow: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.02);
              --card-shadow-hover: 0 4px 12px rgba(0,0,0,0.06), 0 2px 4px rgba(0,0,0,0.03);
              --radius: 12px;
              --radius-sm: 8px;
              --mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
              --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
          }

          * { margin: 0; padding: 0; box-sizing: border-box; }

          :focus-visible {
              outline: 2px solid var(--accent);
              outline-offset: 2px;
              border-radius: 3px;
          }

          @media (prefers-reduced-motion: reduce) {
              *, *::before, *::after {
                  animation-duration: 0.01ms !important;
                  animation-iteration-count: 1 !important;
                  transition-duration: 0.01ms !important;
                  scroll-behavior: auto !important;
              }
          }

          html {
              scroll-behavior: smooth;
          }

          body {
              font-family: var(--sans);
              line-height: 1.7;
              color: var(--text);
              background: var(--bg);
              -webkit-font-smoothing: antialiased;
              -moz-osx-font-smoothing: grayscale;
          }

          /* ── layout ───────────────────────────────── */
          .container {
              width: 100%;
              max-width: 720px;
              margin-left: auto;
              margin-right: auto;
              padding: 0 1.5rem;
          }

          /* ── header / nav ─────────────────────────── */
         header {
              padding: 3rem 0 1.5rem;
              border-bottom: 1px solid var(--border);
              margin-bottom: 2rem;
              display: flex;
              justify-content: space-between;
              align-items: flex-start;
            }

            .header-left {
              display: flex;
              flex-direction: column;
            }

            .rss-icon {
              flex-shrink: 0;
              width: 20px;
              height: 20px;
              color: var(--text-muted);
              transition: color 0.2s;
            }

            .rss-icon:hover {
              color: var(--accent);
            }

          .site-title {
              font-size: 1.6rem;
              font-weight: 700;
              letter-spacing: -0.03em;
              color: var(--text);
              text-decoration: none;
              display: inline-block;
          }

          .site-title:hover {
              color: var(--accent);
          }

          .site-title span {
              color: var(--accent);
          }

          nav {
              margin-top: 0.75rem;
              margin-left: -0.65rem;
              display: flex;
              gap: 0.25rem;
              flex-wrap: wrap;
          }

          nav a {
              font-size: 0.85rem;
              font-weight: 500;
              color: var(--text-muted);
              text-decoration: none;
              padding: 0.3rem 0.65rem;
              border-radius: var(--radius-sm);
              transition: background 0.2s, color 0.2s;
          }

          nav a:hover {
              background: var(--accent-light);
              color: var(--accent);
          }

          /* ── post list ────────────────────────────── */
          .post-list {
              list-style: none;
              display: flex;
              flex-direction: column;
              gap: 0.75rem;
          }

          .post-item {
              background: var(--card-bg);
              border: 1px solid var(--border);
              border-radius: var(--radius);
              padding: 1.5rem;
              transition: box-shadow 0.25s ease, transform 0.2s ease;
              box-shadow: var(--card-shadow);
          }

          .post-item:hover {
              box-shadow: var(--card-shadow-hover);
              transform: translateY(-1px);
          }

          .post-date {
              font-family: var(--mono);
              font-size: 0.75rem;
              font-weight: 500;
              color: var(--text-muted);
              letter-spacing: 0.03em;
              text-transform: uppercase;
              margin-bottom: 0.4rem;
          }

          .post-item h2 {
              font-size: 1.15rem;
              font-weight: 600;
              letter-spacing: -0.02em;
              margin-bottom: 0.35rem;
              line-height: 1.35;
          }

          .post-item h2 a {
              color: var(--text);
              text-decoration: none;
              transition: color 0.2s;
          }

          .post-item h2 a:hover {
              color: var(--accent);
          }

          .post-summary {
              font-size: 0.92rem;
              color: var(--text-muted);
              line-height: 1.6;
              margin-bottom: 0.75rem;
          }

          .post-tags {
              display: flex;
              flex-wrap: wrap;
              gap: 0.35rem;
          }

          .post-tags a {
              display: inline-block;
              background: var(--accent-light);
              color: var(--accent-hover);
              padding: 0.15rem 0.6rem;
              border-radius: 999px;
              font-size: 0.72rem;
              font-weight: 600;
              text-decoration: none;
              letter-spacing: 0.02em;
              transition: background 0.2s, transform 0.15s;
          }

          .post-tags a:hover {
              background: var(--accent);
              color: #fff;
              transform: scale(1.04);
          }

          /* ── single post ──────────────────────────── */
          .post-header {
              margin-bottom: 2rem;
              padding-bottom: 1.5rem;
              border-bottom: 1px solid var(--border);
          }

          .post-header h1 {
              font-size: 1.75rem;
              font-weight: 700;
              letter-spacing: -0.035em;
              line-height: 1.25;
              margin-bottom: 0.5rem;
          }

          .post-header .post-date {
              font-size: 0.8rem;
              margin-bottom: 0;
          }

          .post-body {
              font-size: 1rem;
          }

          .post-body h2 {
              font-size: 1.35rem;
              font-weight: 600;
              letter-spacing: -0.02em;
              margin-top: 2.5rem;
              margin-bottom: 0.75rem;
              padding-bottom: 0.4rem;
              border-bottom: 1px solid var(--border);
          }

          .post-body h3 {
              font-size: 1.1rem;
              font-weight: 600;
              margin-top: 2rem;
              margin-bottom: 0.5rem;
          }

          .post-body p {
              margin-bottom: 1.25rem;
          }

          .post-body a {
              color: var(--accent);
              text-decoration: none;
              border-bottom: 1px solid transparent;
              transition: border-color 0.2s;
          }

          .post-body a:hover {
              border-bottom-color: var(--accent);
          }

          .post-body img {
              max-width: 100%;
              height: auto;
              border-radius: var(--radius-sm);
              box-shadow: var(--card-shadow);
          }

          .post-body blockquote {
              margin: 1.5rem 0;
              padding: 1rem 1.25rem;
              background: var(--bg-alt);
              border-left: 3px solid var(--accent);
              border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
              color: var(--text-muted);
              font-style: italic;
          }

          .post-body table {
              display: block;
              max-width: 100%;
              overflow-x: auto;
              border-collapse: collapse;
              margin: 1.5rem 0;
              font-size: 0.9rem;
              border: 1px solid var(--border);
              border-radius: var(--radius-sm);
          }

          .post-body th,
          .post-body td {
              border: 1px solid var(--border);
              padding: 0.6rem 0.8rem;
              text-align: left;
          }

          .post-body th {
              background: var(--bg-alt);
              font-weight: 600;
              font-size: 0.82rem;
              text-transform: uppercase;
              letter-spacing: 0.04em;
              color: var(--text-muted);
          }

          .post-body pre {
              background: #272822;
              color: #F8F8F2;
              padding: 1.25rem;
              overflow-x: auto;
              border-radius: var(--radius-sm);
              margin: 1.5rem 0;
              font-size: 0.85rem;
              line-height: 1.6;
          }

          .post-body .codehilite {
              border-radius: var(--radius-sm);
              margin: 1.5rem 0;
              overflow: hidden;
          }
          .post-body .codehilite pre { margin: 0; }
          .codehilite .hll { background-color: #49483e }
          .codehilite { background: #272822; color: #F8F8F2 }
          .codehilite .c, .codehilite .ch, .codehilite .cm, .codehilite .cp, .codehilite .cpf, .codehilite .c1, .codehilite .cs { color: #959077 }
          .codehilite .err { color: #ED007E; background-color: #1E0010 }
          .codehilite .k, .codehilite .kc, .codehilite .kd, .codehilite .kp, .codehilite .kr, .codehilite .kt { color: #66D9EF }
          .codehilite .kn, .codehilite .o, .codehilite .ow, .codehilite .nt, .codehilite .gd, .codehilite .gp { color: #FF4689 }
          .codehilite .l, .codehilite .m, .codehilite .mb, .codehilite .mf, .codehilite .mh, .codehilite .mi, .codehilite .mo, .codehilite .il, .codehilite .se { color: #AE81FF }
          .codehilite .s, .codehilite .ld, .codehilite .sa, .codehilite .sb, .codehilite .sc, .codehilite .dl, .codehilite .sd, .codehilite .s2, .codehilite .sh, .codehilite .si, .codehilite .sx, .codehilite .sr, .codehilite .s1, .codehilite .ss { color: #E6DB74 }
          .codehilite .na, .codehilite .nc, .codehilite .nd, .codehilite .ne, .codehilite .nf, .codehilite .nx, .codehilite .fm, .codehilite .gi { color: #A6E22E }
          .codehilite .no, .codehilite .go { color: #66D9EF }

          .post-body code {
              background: var(--bg-alt);
              padding: 0.15rem 0.4rem;
              border-radius: 4px;
              font-size: 0.88em;
              font-family: var(--mono);
              color: var(--accent-hover);
              overflow-wrap: anywhere;
          }

          .post-body pre code {
              background: none;
              padding: 0;
              color: #d4d4d4;
          }

          .post-body ul,
          .post-body ol {
              margin-bottom: 1.25rem;
              padding-left: 2rem;
          }

          .post-body ul { list-style: disc outside; }
          .post-body ol { list-style: decimal outside; }
          .post-body ul ul { list-style: circle outside; }

          .post-body li {
              margin-bottom: 0.3rem;
          }

          .post-body hr {
              border: none;
              border-top: 1px solid var(--border);
              margin: 2.5rem 0;
          }

          /* ── post nav (prev/next) ─────────────────── */
          .post-nav {
              display: grid;
              grid-template-columns: 1fr 1fr;
              gap: 1rem;
              margin-top: 3rem;
              padding-top: 1.5rem;
              border-top: 1px solid var(--border);
          }

          .post-nav a {
              display: flex;
              flex-direction: column;
              gap: 0.25rem;
              padding: 1rem 1.25rem;
              background: var(--card-bg);
              border: 1px solid var(--border);
              border-radius: var(--radius);
              text-decoration: none;
              color: var(--text);
              transition: box-shadow 0.2s, transform 0.15s, border-color 0.2s;
              box-shadow: var(--card-shadow);
          }

          .post-nav a:hover {
              box-shadow: var(--card-shadow-hover);
              transform: translateY(-1px);
              border-color: var(--accent);
          }

          .post-nav-next { text-align: right; }

          .post-nav-label {
              font-family: var(--mono);
              font-size: 0.7rem;
              text-transform: uppercase;
              letter-spacing: 0.05em;
              color: var(--accent);
              font-weight: 600;
          }

          .post-nav-title {
              font-size: 0.92rem;
              font-weight: 500;
              line-height: 1.35;
          }

          /* ── project grid ─────────────────────────── */
          .project-grid {
              list-style: none;
              display: grid;
              grid-template-columns: repeat(auto-fill, minmax(min(100%, 240px), 1fr));
              gap: 1rem;
          }

          .project-card {
              background: var(--card-bg);
              border: 1px solid var(--border);
              border-radius: var(--radius);
              padding: 1.25rem;
              box-shadow: var(--card-shadow);
              transition: box-shadow 0.25s ease, transform 0.2s ease, border-color 0.2s;
              display: flex;
              flex-direction: column;
              gap: 0.6rem;
          }

          .project-card:hover {
              box-shadow: var(--card-shadow-hover);
              transform: translateY(-1px);
              border-color: var(--accent);
          }

          .project-name {
              font-family: var(--mono);
              font-size: 1rem;
              font-weight: 600;
              letter-spacing: -0.01em;
              color: var(--accent);
          }

          .project-tagline {
              font-size: 0.9rem;
              color: var(--text);
              line-height: 1.55;
              flex-grow: 1;
          }

          .project-tags {
              display: flex;
              flex-wrap: wrap;
              gap: 0.3rem;
          }

          .project-tag {
              font-size: 0.68rem;
              font-weight: 600;
              letter-spacing: 0.03em;
              padding: 0.1rem 0.55rem;
              border-radius: 999px;
              background: var(--bg-alt);
              color: var(--text-muted);
          }

          .project-links {
              display: flex;
              flex-wrap: wrap;
              gap: 0.9rem;
              padding-top: 0.4rem;
              border-top: 1px dashed var(--border);
          }

          .project-links a {
              font-size: 0.82rem;
              font-weight: 500;
              color: var(--accent);
              text-decoration: none;
              transition: color 0.2s;
          }

          .project-links a:hover { color: var(--accent-hover); text-decoration: underline; }

          /* ── scroll to top ────────────────────────── */
          .scroll-top {
              position: fixed;
              bottom: 1.5rem;
              right: 1.5rem;
              width: 40px;
              height: 40px;
              border-radius: 50%;
              background: var(--accent);
              color: #fff;
              border: none;
              cursor: pointer;
              box-shadow: var(--card-shadow-hover);
              opacity: 0;
              pointer-events: none;
              transform: translateY(8px);
              transition: opacity 0.2s, transform 0.2s, background 0.2s;
              display: flex;
              align-items: center;
              justify-content: center;
          }

          .scroll-top.visible {
              opacity: 1;
              pointer-events: auto;
              transform: translateY(0);
          }

          .scroll-top:hover { background: var(--accent-hover); }

          .scroll-top svg { width: 18px; height: 18px; }

          /* ── tag page ─────────────────────────────── */
          .tag-page-header {
              margin-bottom: 2rem;
              padding-bottom: 1.5rem;
              border-bottom: 1px solid var(--border);
          }

          .tag-page-header h1 {
              font-size: 1.5rem;
              font-weight: 700;
              letter-spacing: -0.03em;
              margin-bottom: 0.5rem;
          }

          .tag-page-header h1 span {
              color: var(--accent);
          }

          .tag-page-meta {
              display: flex;
              gap: 1.25rem;
              align-items: center;
              flex-wrap: wrap;
              justify-content: space-between;
              margin-top: 0.75rem;
          }

          .tag-page-header a {
              font-size: 0.85rem;
              font-weight: 500;
              color: var(--text-muted);
              text-decoration: none;
              transition: color 0.2s, background 0.2s, border-color 0.2s;
              display: inline-flex;
              align-items: center;
              gap: 0.4rem;
          }

          .tag-page-header a:hover { color: var(--accent); }

          .tag-feed-link {
              padding: 0.3rem 0.7rem;
              border: 1px solid var(--border);
              border-radius: 999px;
              color: var(--accent-hover) !important;
          }

          .tag-feed-link:hover {
              background: var(--accent-light);
              border-color: var(--accent);
          }

          /* ── footer ───────────────────────────────── */
          footer {
              margin-top: 4rem;
              padding: 2rem 0;
              border-top: 1px solid var(--border);
              color: var(--text-muted);
              font-size: 0.8rem;
              text-align: center;
          }

          footer a {
              color: var(--accent);
              text-decoration: none;
          }

          footer a:hover {
              text-decoration: underline;
          }

          /* ── responsive ───────────────────────────── */
          @media (max-width: 600px) {
              header {
                  padding: 2rem 0 1rem;
              }

              .post-item {
                  padding: 1.25rem;
              }

              .post-header h1 {
                  font-size: 1.4rem;
              }

              .post-body pre {
                  font-size: 0.8rem;
                  padding: 1rem;
              }

              .post-nav {
                  grid-template-columns: 1fr;
              }

              .post-nav-next { text-align: left; }
          }

          /* ── subtle animation ─────────────────────── */
          @keyframes fadeIn {
              from { opacity: 0; transform: translateY(8px); }
              to    { opacity: 1; transform: translateY(0); }
          }

          .post-item {
              animation: fadeIn 0.3s ease both;
          }

          .post-item:nth-child(1) { animation-delay: 0s; }
          .post-item:nth-child(2) { animation-delay: 0.04s; }
          .post-item:nth-child(3) { animation-delay: 0.08s; }
          .post-item:nth-child(4) { animation-delay: 0.12s; }
          .post-item:nth-child(5) { animation-delay: 0.16s; }
          .post-item:nth-child(6) { animation-delay: 0.20s; }
          .post-item:nth-child(7) { animation-delay: 0.24s; }
      </style>
</head>
<body>
       <div class="container">
           <header>
               <div class="header-left">
                   <a href="/" class="site-title">savannah<span>.</span>dev</a>
                   <nav>
                       <a href="/">posts</a>
                       <a href="/about">about</a>
                       <a href="/projects">projects</a>
                   </nav>
               </div>
