{% extends "base.html" %}

{% block content %}
<div class="tag-page-header">
     <h1>Posts tagged: <span>{{ tag }}</span></h1>
     <div class="tag-page-meta">
         <a href="/">&larr; all posts</a>
         <a href="/tags/{{ tag_slug }}/index.xml" class="tag-feed-link" aria-label="RSS feed for {{ tag }}">
             <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                 <path d="M4 11a9 9 0 0 1 9 9"/>
                 <path d="M4 4a16 16 0 0 1 16 16"/>
                 <circle cx="5" cy="19" r="1"/>
             </svg>
             subscribe
         </a>
     </div>
</div>
<ul class="post-list">
     {% for post in posts %}
     <li class="post-item">
         <div class="post-date">{{ post.date.strftime("%B %d, %Y") }}</div>
         <h2><a href="/posts/{{ post.slug }}/">{{ post.title }}</a></h2>
         {% if post.summary %}
         <p class="post-summary">{{ post.summary }}</p>
         {% endif %}
     </li>
     {% endfor %}
</ul>
{% endblock %}
