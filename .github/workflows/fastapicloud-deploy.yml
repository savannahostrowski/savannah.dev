name: "Deploy to FastAPI Cloud"

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: "Deploy"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Checkout debugwand-talk repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: savannahostrowski/debugwand-talk
          token: ${{ secrets.TALK_REPO_TOKEN }}
          path: _talks/remote-debug-talk

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Build remote-debug-talk slides
        working-directory: _talks/remote-debug-talk
        run: |
          bun install
          bun run build -- --base /talks/remote-debug/ --without-notes

      - name: Copy slides into talks/
        run: |
          mkdir -p talks/remote-debug
          cp -r _talks/remote-debug-talk/dist/. talks/remote-debug/

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Deploy to FastAPI Cloud
        run: uv run fastapi deploy
        env:
          FASTAPI_CLOUD_TOKEN: ${{ secrets.FASTAPI_CLOUD_TOKEN }}
          FASTAPI_CLOUD_APP_ID: ${{ secrets.FASTAPI_CLOUD_APP_ID }}
